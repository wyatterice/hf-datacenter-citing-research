name: Deploy to GitHub Pages

# Builds the React front-end in web/ and publishes it to GitHub Pages.
# Enable once in the repo: Settings > Pages > Source = "GitHub Actions".
on:
  push:
    branches: [main]
  workflow_dispatch:

# Grant the workflow the tokens Pages needs to publish.
permissions:
  contents: read
  pages: write
  id-token: write

# Allow one deploy at a time; do not cancel an in-progress publish.
concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: web
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: web/package-lock.json

      - name: Install dependencies
        run: npm ci

      # Regenerate scores.json from Model/county_scores.csv so the deployed
      # data always tracks the source CSV.
      - name: Build data
        run: npm run build:data

      - name: Build
        run: npm run build

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: web/dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
